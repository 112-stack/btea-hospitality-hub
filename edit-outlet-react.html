<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Outlet - BTEA Web Portal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Styles -->
    <style>
        /* Section Headers */
        .section-header {
            margin-top: 1.5rem;
        }

        /* Card Headers */
        .card-header h5 {
            font-size: 1rem;
        }

        /* Form Labels */
        .col-form-label.fw-semibold {
            font-weight: 600 !important;
        }

        /* Required Field Indicator */
        .text-danger {
            font-weight: bold;
        }

        /* Input Groups */
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
        }

        .input-group .form-control {
            border-left: none;
        }

        .input-group:focus-within .input-group-text {
            border-color: #86b7fe;
            background-color: #e7f1ff;
        }

        /* File Input Styling */
        .form-control[type="file"] {
            padding: 0.375rem 0.75rem;
        }

        /* Card Borders */
        .card {
            transition: box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 0.125rem 0.5rem rgba(0, 0, 0, 0.15);
        }

        /* Modal Dialog */
        .modal-xl {
            max-width: 1140px;
        }

        /* Form Text */
        .form-text {
            font-size: 0.85rem;
            color: #6c757d;
        }

        /* Radio Button Groups */
        .btn-check:checked + .btn-outline-success {
            background-color: #198754;
            border-color: #198754;
        }

        .btn-check:checked + .btn-outline-danger {
            background-color: #dc3545;
            border-color: #dc3545;
        }

        /* Alert Box */
        .alert-info {
            border-left: 4px solid #0dcaf0;
        }

        /* Textarea */
        textarea.form-control {
            resize: vertical;
        }

        /* Switch Styling */
        .form-switch .form-check-input {
            width: 3rem;
            height: 1.5rem;
        }

        .form-switch .form-check-input:checked {
            background-color: #198754;
            border-color: #198754;
        }

        /* Smooth transitions */
        .card, .btn, input, select, textarea {
            transition: all 0.2s ease;
        }

        /* Loading Spinner */
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: 0.15em;
        }

        /* Badge Styling */
        .badge {
            font-size: 0.85rem;
            padding: 0.35em 0.65em;
        }

        /* Content Header */
        .content-header {
            border-bottom: 2px solid #dee2e6;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .content-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <!-- React Root -->
    <div id="react-root"></div>

    <!-- Hidden form for server submission (if needed for backward compatibility) -->
    <form action="/EditOutlet/doUpdate" enctype="multipart/form-data" id="outletUpdateForm" method="post" style="display: none;">
        <input value="" name="draftId" type="hidden">
        <input value="" name="outletRequestId" type="hidden">
        <input value="0" name="preSelectOutletType" type="hidden">
        <div id="tst"></div>
    </form>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Server Data (Pass data from server to React) -->
    <script>
        // This would be populated by your server
        window.outletData = {
            outlets: [],
            outletTypes: [
                { Key: 449930000, Value: 'Specialty Restaurant' },
                { Key: 449930001, Value: 'Lounge' },
                { Key: 449930002, Value: 'All Day Dining' },
                { Key: 449930003, Value: 'Club Lounge' },
                { Key: 449930013, Value: 'Cafe' },
                { Key: 449930016, Value: 'Fine Dining' },
                { Key: 449930017, Value: 'Ramadan Tent' },
                { Key: 449930028, Value: 'Spa' }
            ],
            managementTypes: [
                { Key: 449930000, Value: 'Self Operated' },
                { Key: 449930001, Value: 'Outsourced' }
            ],
            offices: [],
            isBoutique: false,
            isExceptional: false,
            isApartmentHotel: false,
            stars: 0,
            rooms: 0,
            processingOutlets: [],
            inProcessOutlets: [],
            rInfo: {}
        };
    </script>

    <!-- React App (bundled by Vite in production) -->
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
